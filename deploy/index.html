<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Ste-Marie Sports - En construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #7c1215;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .bg-image {
      position: fixed;
      inset: 0;
      background: url('snowmobile-header.jpeg') center center / cover no-repeat;
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(230, 30, 37, 0.85) 0%, rgba(124, 18, 21, 0.9) 100%);
      z-index: 1;
    }

    .gate {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 60px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .gate__logo {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 6px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 32px;
      text-transform: uppercase;
    }

    .gate__title {
      font-size: 48px;
      font-weight: 800;
      color: #ffffff;
      margin: 0 0 16px;
      line-height: 1.1;
    }

    .gate__subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .gate__form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .gate__input {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      font-family: 'Inter', system-ui, sans-serif;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      color: #ffffff;
      outline: none;
      transition: all 0.2s ease;
      text-align: center;
      letter-spacing: 2px;
    }

    .gate__input::placeholder {
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1px;
    }

    .gate__input:focus {
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
    }

    .gate__input--error {
      border-color: #ff6b6b;
      background: rgba(255, 107, 107, 0.15);
      animation: shake 0.4s ease;
    }

    .gate__error {
      color: #ffcccc;
      font-size: 14px;
      display: none;
    }

    .gate__error--visible {
      display: block;
    }

    .gate__button {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #7c1215;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .gate__button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .gate__button:active { transform: translateY(0); }
    .gate__button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .gate__contact {
      margin-top: 24px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }

    .gate__contact a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
    }

    .gate__contact a:hover { text-decoration: underline; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @media (max-width: 480px) {
      .gate { padding: 40px 24px; }
      .gate__title { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="gate">
    <div class="gate__logo">STE-MARIE SPORTS</div>
    <h1 class="gate__title">En construction</h1>
    <p class="gate__subtitle">
      Ce site est actuellement en développement.<br>
      Entrez le mot de passe pour accéder au site.
    </p>
    <form class="gate__form" onsubmit="return handleSubmit(event)">
      <input
        type="password"
        id="password"
        class="gate__input"
        placeholder="Mot de passe"
        autofocus
      >
      <p class="gate__error" id="error">Mot de passe incorrect</p>
      <button type="submit" class="gate__button" id="btn">Accéder au site</button>
    </form>
    <p class="gate__contact">Contactez-nous: <a href="mailto:michel.aubin@pasuper.com">michel.aubin@pasuper.com</a></p>
  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      var pwd = document.getElementById('password').value;
      var err = document.getElementById('error');
      var input = document.getElementById('password');

      if (pwd === 'Pasuper7803!') {
        document.cookie = 'stemarie_access=granted; path=/; max-age=' + (60*60*24*30);
        window.location.href = '/coming-soon.html';
      } else {
        err.classList.add('gate__error--visible');
        input.classList.add('gate__input--error');
        setTimeout(function() { input.classList.remove('gate__input--error'); }, 400);
      }
      return false;
    }

    if (document.cookie.indexOf('stemarie_access=granted') !== -1) {
      window.location.href = '/coming-soon.html';
    }
  </script>
</body>
</html>
