<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Ste-Marie Sports - En construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #7c1215;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .bg-image {
      position: fixed;
      inset: 0;
      background: url('snowmobile-header.jpeg') center center / cover no-repeat;
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(230, 30, 37, 0.8) 0%, rgba(124, 18, 21, 0.85) 100%);
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 60px 48px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .logo {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 6px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 32px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 48px;
      font-weight: 800;
      color: #ffffff;
      margin: 0 0 24px;
      line-height: 1.1;
    }

    p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: rgba(255, 255, 255, 0.3);
      margin: 32px auto;
      border-radius: 2px;
    }

    .contact {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .contact a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-weight: 600;
    }

    .contact a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="card">
    <div class="logo">STE-MARIE SPORTS</div>
    <h1>En construction</h1>
    <p>Notre nouveau site web arrive bientôt!</p>
    <p>Nous travaillons fort pour vous offrir la meilleure expérience en ligne pour vos véhicules, pièces et accessoires.</p>
    <div class="divider"></div>
    <p class="contact">Contactez-nous: <a href="mailto:michel.aubin@pasuper.com">michel.aubin@pasuper.com</a></p>
  </div>

  <script>
    if (document.cookie.indexOf('stemarie_access=granted') === -1) {
      window.location.href = '/';
    }
  </script>
</body>
</html>
